%YAML:1.0

#System.LoadAtlasFromFile: "SavedMap/Xinghu1705"
#System.SaveAtlasToFile: "SavedMap/Xinghu1705"
#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------
File.version: "1.0"
Camera.type: "PinHole"

topics.rgb: /camera/camera/color/image_raw
topics.depth: /camera/camera/aligned_depth_to_color/image_raw
topics.imu: /livox/imu0
# topics.rgb: /camera/color/image_raw
# topics.depth: /camera/aligned_depth_to_color/image_raw
# topics.imu: /camera/imu

# Camera calibration and distortion parameters (OpenCV) 
# Camera1.fx: 297.2374027525991
# Camera1.fy: 141.99831224361773
# Camera1.cx: 1190.6356525715146
# Camera1.cy: 196.26670704757336

Camera1.fx: 606.0897827148438
Camera1.fy: 605.6737670898438 
Camera1.cx: 328.1231689453125
Camera1.cy: 244.74351501464844

# Camera1.k1: 0.01001250941143154
# Camera1.k2: -1.1238412815956413e05
# Camera1.p1: 0.0012360965870680245
# Camera1.p2: 0.04303138358131477
# Camera1.k3: 0.0

Camera1.k1: 0.0
Camera1.k2: 0.0
Camera1.p1: 0.0
Camera1.p2: 0.0
Camera1.k3: 0.0

Camera.width: 640
Camera.height: 480

# Camera frames per second 
Camera.fps: 30

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

# Close/Far threshold. Baseline times.
Stereo.ThDepth: 40.0
Stereo.b: 0.07732

# Depth map values factor
RGBD.DepthMapFactor: 1000.0 # 1.0 for ROS_bag


# Transformation from body-frame (imu) to left camera
IMU.T_b_c1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [0.01845205, -0.05628505, 0.99824422, 0.0006184,
         -0.76677433, -0.64153969, -0.02199916, 0.00239687,
         0.64165151, -0.76502211, -0.05499566, -0.00077471,
         0.0, 0.0, 0.0, 1.0]
  #  data: [0.99992252, 0.01198668, 0.00335874, 0.02767682,
  #        -0.01196254, 0.99990312, -0.00711659, 0.00366475,
  #        -0.00344372, 0.00707586, 0.99996904, 0.02991761,
  #        0.0, 0.0, 0.0, 1.0]


# Do not insert KFs when recently lost
IMU.InsertKFsWhenLost: 0

# IMU noise (Use those from VINS-mono)
IMU.NoiseGyro: 1e-2 # 3 # 2.44e-4 #1e-3 # rad/s^0.5
IMU.NoiseAcc: 1e-1 #2 # 1.47e-3 #1e-2 # m/s^1.5
IMU.GyroWalk: 1e-6 # rad/s^1.5
IMU.AccWalk: 1e-4 # m/s^2.5
IMU.Frequency: 200.0

TimeDelay: 0.00

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# ORB Extractor: Number of features per image
ORBextractor.nFeatures: 1000

# ORB Extractor: Scale factor between levels in the scale pyramid 	
ORBextractor.scaleFactor: 1.2

# ORB Extractor: Number of levels in the scale pyramid	
ORBextractor.nLevels: 8

# ORB Extractor: Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing a minimum response.
# Firstly we impose iniThFAST. If no corners are detected we impose a lower value minThFAST
# You can lower these values if your images have low contrast			
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Semantic Parameters
#--------------------------------------------------------------------------------------------
Semantic.ObjectLocalBA: 0
Semantic.Online: 1
Semantic.SemanticWeightPath: /home/brain/LYCodes/SDO_SLAM/SemanticWeights/yolov11x-seg.engine
Semantic.DataSet: issac_sim
Semantic.OfflineSemanticPath: /home/brain/DataSet/ISAAC_NAV_DATASET/collected_data/jetbot_10234403_1/yolo_semantic/

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.Open: 1
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0

